<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>
    <link rel="stylesheet" href="weather.css">
</head>
<body>
        <div class="main">
            
            <video src="From Klickpin.com- Try this guide to elegant family routine ideas that feel luxe without spending a fortune designed to feel inspiring useful and.mp4" autoplay muted loop></video>
        <div class="nav">
            <img src="https://i.pinimg.com/736x/0d/56/86/0d56860704e1e99e9968a5abcfd36238.jpg" alt="logo">
            <span class="nav-title">WeatherLy</span>
        </div>
        <div class="container">
            <p class="top"> real-time forecast </p>
            <h1 class="heading">Weather Forecast</h1>

            <div class="search-card">
                <div class="box">
                    <div class="input-wrap">
                        <input type="text" placeholder="Enter city name…" id="cityInput">
                    </div>
                    <button>Get Weather</button>
                </div>

                <div class="information">
                    <h2 id="city_name"></h2>
                    <p id="temp"></p>
                </div>
                <p id="desc"></p>
            </div>

        </div>
        <div class="p2-inner">
            <h2 class="p2-heading">Today's Recommendation</h2>

            <div class="activity-card">
                <div class="activity-body">
                    <h3>What to do today</h3>
                    <p id="activity-text">Search for a city to see recommended activities!</p>
                </div>
            </div>
        </div>

        </div>
</body>
<script src="weather.js"></script>
</html>
